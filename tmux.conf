# Ctrl-s prefix key. Default => C-b. Send C-s with repeat option via C-s C-stmux
# ============================================================
# PREFIX
# ============================================================
unbind C-b
set -g prefix C-s
bind-key -r C-s send-prefix


# ============================================================
# SHELL & TERMINAL
# ============================================================
set -g default-shell /opt/homebrew/bin/fish

#set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB"
set -g default-terminal "tmux-256color"
set -as terminal-features ",ghostty:RGB"
set -g allow-passthrough on
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:extkeys"
set -as terminal-features ",*:clipboard"


# ============================================================
# GENERAL OPTIONS
# ============================================================
set -g base-index 1
set-option -g renumber-windows on
set-option -s escape-time 0
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
set -g history-limit 50000
set -g display-panes-time 350
set -g display-time 1500
set -g mouse on
set -g focus-events on

set-option -g status-keys "emacs"


# ============================================================
# WINDOWS & PANES
# ============================================================
set-window-option -g mode-keys vi
set-window-option -g status-position top

bind \\ split-window -l 40% -h -c "#{pane_current_path}"
bind - split-window -l 20% -v -c "#{pane_current_path}"
bind c new-window -c '#{pane_current_path}'

bind -n S-Left  resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down  resize-pane -D 1
bind -n S-Up    resize-pane -U 1

bind-key -n C-S-Left  swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind-key f resize-pane -Z
bind-key e set-window-option synchronize-panes \; display "synchronize-panes: #{?pane_synchronized,ON,OFF}"


# ============================================================
# SMART PANE SWITCHING (vim-aware)
# ============================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'


# ============================================================
# COPY MODE (vi)
# ============================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v     send -X begin-selection
bind-key -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 0     send -X back-to-indentation
bind-key -T copy-mode-vi Space send -X jump-again

unbind -T copy-mode-vi Enter
unbind -T copy-mode-vi Space

bind y   run 'tmux save-buffer - | pbcopy'
bind C-y run 'tmux save-buffer - | pbcopy'

bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up"   "send -X search-backward-incremental \"%%%\""
bind-key / copy-mode\; command-prompt -i -p "search up"       "send -X search-backward-incremental \"%%%\""

bind-key -T copy-mode-vi C-v send -X rectangle-toggle


# ============================================================
# SESSION & WINDOW MANAGEMENT
# ============================================================
bind r source-file ~/.tmux.conf \; display "Reload tmux configuration"

bind-key C-j choose-tree -s
bind-key b   break-pane -d
bind-key C-b send-keys 'tat && exit' 'C-m'
bind-key K   run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'
bind-key j   command-prompt -p "join pane from: "  "join-pane -h -s '%%'"
bind-key s   display-panes\; command-prompt -p "pane #: " "swap-pane -t '%%'"
bind-key n command-prompt -I "#{window_name}" "rename-window '%%'"
bind-key M command-prompt -p "move window to session:" "move-window -t '%%:'"


# ============================================================
# POPUPS
# ============================================================
bind C-d popup -d "~/dotfiles/" -xC -yC -w81% -h80% -E "nvim"
bind -r g   popup -d '#{pane_current_path}' -E -w 80% -h 80% lazygit
bind-key h  split-window -v "btop"
bind-key C-t popup -d '#{pane_current_path}' -xC -yC -w 60% -h 40% -E "fish"


# ============================================================
# STATUS BAR
# ============================================================
set -g status-right-length 100
set -g status-left-length 100

set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "application pomodoro_plus cpu battery uptime"

set -g status-left  "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"


# ============================================================
# PLUGINS (tpm)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'

# Keep at the very bottom
run '~/.tmux/plugins/tpm/tpm'
